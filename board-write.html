<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>글쓰기 | 로봇소프트웨어과</title>
  <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">
        <div class="logo-icon">🤖</div>
        로봇소프트웨어과
      </a>
      <div class="nav-links" id="navLinks">
        <a href="index.html">학과소개</a>
        <a href="index.html#curriculum">교육과정</a>
        <a href="index.html#professors">교수소개</a>
        <a href="index.html#clubs">전공동아리</a>
        <a href="board.html" class="active">자유게시판</a>
      </div>
      <div class="hamburger" onclick="document.getElementById('navLinks').classList.toggle('open')">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <div class="main-full">
    <div class="form-container">
      <h2 id="formTitle">📝 게시글 작성</h2>
      <form id="postForm" onsubmit="return handleSubmit(event)">
        <input type="hidden" id="postId">
        <div class="form-row">
          <div class="form-group">
            <label>작성자 <span class="required">*</span></label>
            <input type="text" id="author" required placeholder="이름을 입력하세요" maxlength="20">
          </div>
          <div class="form-group">
            <label>비밀번호 <span class="required">*</span></label>
            <input type="password" id="password" required placeholder="수정/삭제 시 필요합니다" maxlength="20">
          </div>
        </div>
        <div class="form-group">
          <label>제목 <span class="required">*</span></label>
          <input type="text" id="title" required placeholder="제목을 입력하세요" maxlength="100">
        </div>
        <div class="form-group">
          <label>내용 <span class="required">*</span></label>
          <textarea id="content" required placeholder="내용을 입력하세요"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="location.href='board.html'">취소</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">등록하기</button>
        </div>
      </form>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div>
        <div class="footer-logo">🤖 로봇소프트웨어과</div>
        <p class="footer-info" style="margin-top:8px;">동양미래대학교 로봇소프트웨어과</p>
      </div>
      <p class="footer-info">© 2026 동양미래대학교 로봇소프트웨어과. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js?v=2"></script>
  <script src="js/supabase-config.js?v=2"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const editId = params.get('edit');

    // Edit mode: load existing post
    if (editId) {
      document.getElementById('formTitle').textContent = '✏️ 게시글 수정';
      document.getElementById('submitBtn').textContent = '수정하기';
      document.title = '글수정 | 로봇소프트웨어과';
      loadPost(editId);
    }

    async function loadPost(id) {
      try {
        const { data, error } = await db
          .from('posts')
          .select('*')
          .eq('id', id)
          .single();
        if (error) throw error;
        document.getElementById('postId').value = data.id;
        document.getElementById('author').value = data.author;
        document.getElementById('title').value = data.title;
        document.getElementById('content').value = data.content;
        document.getElementById('author').readOnly = true;
        document.getElementById('author').style.opacity = '0.6';
      } catch (err) {
        showToast('게시글을 불러올 수 없습니다.', 'error');
        setTimeout(() => location.href = 'board.html', 1500);
      }
    }

    async function handleSubmit(e) {
      e.preventDefault();
      const id = document.getElementById('postId').value;
      const author = document.getElementById('author').value.trim();
      const password = document.getElementById('password').value;
      const title = document.getElementById('title').value.trim();
      const content = document.getElementById('content').value.trim();

      if (!author || !password || !title || !content) {
        showToast('모든 항목을 입력해주세요.', 'error');
        return false;
      }

      try {
        if (id) {
          // Update mode - verify password first
          const { data: existing } = await db
            .from('posts').select('password').eq('id', id).single();
          if (existing.password !== password) {
            showToast('비밀번호가 일치하지 않습니다.', 'error');
            return false;
          }
          const { error } = await db
            .from('posts')
            .update({ title, content, updated_at: new Date().toISOString() })
            .eq('id', id);
          if (error) throw error;
          showToast('게시글이 수정되었습니다.', 'success');
        } else {
          // Create mode
          const { error } = await db
            .from('posts')
            .insert([{ title, content, author, password }]);
          if (error) throw error;
          showToast('게시글이 등록되었습니다.', 'success');
        }
        setTimeout(() => location.href = 'board.html', 1200);
      } catch (err) {
        showToast('오류가 발생했습니다: ' + err.message, 'error');
      }
      return false;
    }

    function showToast(msg, type = 'success') {
      const toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3200);
    }
  </script>
</body>
</html>
